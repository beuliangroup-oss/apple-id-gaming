<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>APPLE ID GAMING | Top Up Game Murah & Cepat</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--primary:#7b2cff;
--secondary:#9c4dff;
--dark:#0b0f1c;
--card:#141c33;
}

body{
font-family:Poppins,sans-serif;
background:url("assets/images/bg-galaxy.png") center center/cover fixed;
background-color:#0b0f1c;
color:#fff;
overflow-x:hidden;
}

/* HEADER */

header{
position:sticky;
top:0;
z-index:999;
background:rgba(10,10,20,.85);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,255,255,.08);
}

.navbar{
max-width:1400px;
margin:auto;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.left-nav{
display:flex;
align-items:center;
gap:12px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:55px;
height:55px;
border-radius:50%;
}

.logo h1{
font-family:Orbitron,sans-serif;
font-size:20px;
}

.right-nav{
display:flex;
align-items:center;
gap:10px;
}

.hamburger,
.search-btn{
width:42px;
height:42px;
border:none;
border-radius:10px;
cursor:pointer;
background:#182243;
color:white;
font-size:18px;
}

.country-select{
padding:10px 15px;
border:none;
border-radius:10px;
background:#182243;
color:white;
}

.login-btn{
padding:10px 20px;
border-radius:10px;
background:linear-gradient(90deg,#ffb300,#ff6f00);
font-weight:600;
color:white;
text-decoration:none;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:-300px;
top:0;
width:280px;
height:100%;
background:#101933;
z-index:9999;
padding:25px;
transition:.4s;
overflow-y:auto;
}

.sidebar.active{
left:0;
}

.sidebar-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.sidebar-header img{
width:50px;
}

.sidebar-header button{
background:none;
border:none;
font-size:25px;
color:white;
cursor:pointer;
}

.sidebar a{
display:block;
padding:15px 0;
border-bottom:1px solid rgba(255,255,255,.08);
text-decoration:none;
color:white;
}

/* HERO */

.hero{
padding:100px 20px;
text-align:center;
background:
radial-gradient(circle,
rgba(123,44,255,.35),
transparent 70%);
}

.hero img{
width:220px;
margin-bottom:20px;
filter:drop-shadow(0 0 30px #7b2cff);
animation:floating 8s infinite ease-in-out;
}

@keyframes floating{

0%{
transform:translate(0,0);
}

25%{
transform:translate(15px,-10px);
}

50%{
transform:translate(-10px,12px);
}

75%{
transform:translate(10px,15px);
}

100%{
transform:translate(0,0);
}

}

.hero h2{
font-size:58px;
font-family:Orbitron,sans-serif;
margin-bottom:15px;
}

.hero p{
max-width:700px;
margin:auto;
color:#ccc;
}

.btn{
display:inline-block;
margin-top:25px;
background:linear-gradient(90deg,#7b2cff,#9c4dff);
padding:14px 35px;
border-radius:50px;
font-weight:bold;
color:white;
text-decoration:none;
}

/* SECTION */

.section{
padding:70px 20px;
}

.section-title{
text-align:center;
font-size:34px;
margin-bottom:40px;
font-family:Orbitron,sans-serif;
}

/* GAME */

.game-grid{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.game-card{
background:rgba(20,28,51,.9);
padding:25px;
border-radius:16px;
text-align:center;
transition:.3s;
}

.game-card:hover{
transform:translateY(-6px);
}

/* PRODUCT */

.product-grid{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.product{
background:rgba(20,28,51,.9);
padding:25px;
border-radius:18px;
}

.price{
font-size:24px;
color:#00ff95;
font-weight:bold;
margin:15px 0;
}

.product button{
width:100%;
border:none;
background:#7b2cff;
color:white;
padding:12px;
border-radius:10px;
cursor:pointer;
}

/* PAYMENT */

.payment-grid{
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
}

.payment{
background:#141c33;
padding:20px;
border-radius:15px;
text-align:center;
}

/* CART */

.cart{
max-width:800px;
margin:auto;
background:#141c33;
padding:25px;
border-radius:20px;
}

.checkout{
display:inline-block;
background:#00c853;
padding:14px 25px;
border-radius:12px;
margin-top:20px;
color:white;
text-decoration:none;
}

/* SEARCH */

.search-modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
justify-content:center;
align-items:center;
z-index:99999;
}

.search-box{
background:#101933;
padding:25px;
border-radius:15px;
width:90%;
max-width:500px;
}

.search-box input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-bottom:15px;
}

.search-box button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#7b2cff;
color:white;
}

/* FOOTER */

footer{
padding:40px;
text-align:center;
background:#070b14;
margin-top:50px;
}

@media(max-width:768px){

.hero h2{
font-size:38px;
}

.logo h1{
font-size:16px;
}

.country-select{
display:none;
}

}

</style>
</head>

<body>

<div class="sidebar" id="sidebar">

<div class="sidebar-header">
<img src="assets/images/logo.png">
<button id="closeMenu">✕</button>
</div>

<a href="#games">🎮 Game</a>
<a href="#produk">🛒 Produk</a>
<a href="#payment">💳 Pembayaran</a>
<a href="#">🎁 Promo</a>
<a href="#">⭐ Keanggotaan</a>
<a href="#">❓ FAQ</a>
<a href="#">🎧 Dukungan Pelanggan</a>
<a href="#">🤝 Program Kemitraan</a>
<a href="#">💼 Program Reseller</a>

</div>

<header>

<div class="navbar">

<div class="left-nav">

<button id="menuToggle" class="hamburger">☰</button>

<div class="logo">
<img src="assets/images/logo.png">
<h1>APPLE ID GAMING</h1>
</div>

</div>

<div class="right-nav">

<button id="openSearch" class="search-btn">🔍</button>

<select class="country-select">
<option>🇮🇩 ID</option>
<option>🇺🇸 EN</option>
<option>🇲🇾 MY</option>
</select>

<a href="#" class="login-btn">MASUK</a>

</div>

</div>

</header>

<section class="hero">

<img src="assets/images/logo-bubble.png"
onerror="this.src='assets/images/logo.png'">

<h2>TOP UP GAME FAVORITMU</h2>

<p>
Top Up Diamond, UC, Voucher dan Membership
proses instan 24 jam.
</p>

<a href="#produk" class="btn">
TOP UP SEKARANG
</a>

</section>

<!-- Lanjutkan section GAME, PRODUK, PAYMENT, CART milik Anda yang lama -->

<div class="search-modal" id="searchModal">

<div class="search-box">

<input type="text" placeholder="Cari game favoritmu...">

<button id="closeSearch">
Tutup
</button>

</div>

</div>

<script>

const sidebar =
document.getElementById("sidebar");

document.getElementById("menuToggle")
.onclick = () =>{
sidebar.classList.add("active");
};

document.getElementById("closeMenu")
.onclick = () =>{
sidebar.classList.remove("active");
};

document.getElementById("openSearch")
.onclick = () =>{
document.getElementById("searchModal")
.style.display="flex";
};

document.getElementById("closeSearch")
.onclick = () =>{
document.getElementById("searchModal")
.style.display="none";
};

</script>

</body>
</html>
