<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Top Up</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(90deg,#07113a,#030818);
color:white;
}

.top-banner{
background:linear-gradient(90deg,#9a6233,#3a2d3d);
padding:15px;
font-weight:600;
font-size:15px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
}

.logo{
font-size:38px;
font-weight:700;
}

.logo span{
color:#ff8b22;
}

.login-btn{
background:#ff9d31;
border:none;
padding:14px 25px;
border-radius:14px;
color:white;
font-weight:600;
font-size:18px;
}

.page-title{
padding:15px;
font-size:24px;
font-weight:600;
}

.search-box{
margin:0 15px;
background:#2a416f;
border-radius:30px;
padding:15px 20px;
}

.search-box input{
width:100%;
background:none;
border:none;
outline:none;
color:white;
font-size:18px;
}

.filter{
margin:15px;
background:#2a416f;
border-radius:30px;
padding:15px 20px;
font-size:18px;
color:#cfd7ea;
}

.category{
display:flex;
gap:12px;
overflow-x:auto;
padding:0 15px 20px;
}

.category button{
border:none;
background:#29406d;
color:white;
padding:14px 24px;
border-radius:30px;
font-size:16px;
white-space:nowrap;
}

.category button.active{
background:#ff9829;
box-shadow:0 0 15px rgba(255,152,41,.6);
}

.letter{
padding:20px 15px;
font-size:42px;
font-weight:700;
}

.games{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
padding:0 15px 30px;
}

.card{
background:#1d2d57;
border-radius:30px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.info{
padding:15px;
text-align:center;
}

.publisher{
font-size:14px;
opacity:.8;
}

.game-name{
font-size:22px;
font-weight:600;
margin-top:5px;
}

.topup{
margin-top:15px;
width:100%;
padding:10px;
border-radius:25px;
border:2px solid #ff9829;
background:none;
color:#ff9829;
font-weight:600;
font-size:16px;
}

@media(max-width:480px){

.logo{
font-size:28px;
}

.card img{
height:140px;
}

.game-name{
font-size:18px;
}
}
</style>
</head>

<body>

<div class="top-banner">
INSTANT TOP UP! INSTANT PLAY!
</div>

<div class="header">
<div class="logo">
☰ apple<span>id</span>gaming</span>
</div>

<button class="login-btn">
MASUK
</button>
</div>

<div class="page-title">
← Game
</div>

<div class="search-box">
<input type="text" placeholder="Cari Game...">
</div>

<div class="filter">
Urutan Abjad (A sampai Z)
</div>

<div class="category">
<button class="active">Semua Produk</button>
<button>Flash Top-Up</button>
<button>Voucher</button>
<button>Game Lokal</button>
</div>

<div class="letter">A</div>

<div class="games">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/en/4/44/Arena_of_Valor_logo.png">
<div class="info">
<div class="publisher">Garena</div>
<div class="game-name">Arena of Valor</div><button class="topup"
onclick="location.href='pembayaran.html'">
TOP UP
</button>
</div>
</div>

<div class="card">
<img src="https://play-lh.googleusercontent.com/GzR2J4C5N2Q1f4YVfQxQ4A3kGkQ2TgN7.jpg">
<div class="info">
<div class="publisher">Uniugame</div>
<div class="game-name">AU2 Mobile</div>
<button class="topup"
onclick="location.href='pembayaran.html'">
TOP UP
</button>
</div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/en/9/9e/Mobile_Legends_Bang_Bang_logo.png">
<div class="info">
<div class="publisher">Moonton</div>
<div class="game-name">Mobile Legends</div>
<button class="topup"
onclick="location.href='pembayaran.html'">
TOP UP
</button>
</div>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/en/0/09/PUBG_Mobile_logo.png">
<div class="info">
<div class="publisher">Tencent</div>
<div class="game-name">PUBG Mobile</div>
<button class="topup"
onclick="location.href='pembayaran.html'">
TOP UP
</button>
</div>
</div>

</div>

</body>
</html>
